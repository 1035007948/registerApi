server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: register-api
  
  # 数据库配置（使用H2内存数据库，方便测试）
  datasource:
    url: jdbc:h2:mem:registerdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # H2控制台配置（开发环境使用）
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

# JWT配置
jwt:
  secret: mySecretKey12345678901234567890
  expiration: 86400000

# 日志配置
logging:
  level:
    com.example.registerapi: DEBUG
    org.springframework.security: DEBUG
